<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#059669"/>

  <!-- Sun rays (top right) -->
  <circle cx="23" cy="9" r="3.5" fill="#FCD34D"/>
  <line x1="23" y1="4" x2="23" y2="5.5" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="12.5" x2="23" y2="14" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="9" x2="19.5" y2="9" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.5" y1="9" x2="28" y2="9" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="5.5" x2="20.5" y2="6.5" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.5" y1="11.5" x2="26.5" y2="12.5" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tree trunk -->
  <rect x="14.5" y="20" width="3" height="7" rx="1" fill="#A7F3D0"/>

  <!-- Tree canopy (layered triangles) -->
  <polygon points="16,7 23,20 9,20" fill="#ECFDF5"/>
  <polygon points="16,11 22,22 10,22" fill="#D1FAE5"/>
  <polygon points="16,15 21,24 11,24" fill="#A7F3D0"/>
</svg>
